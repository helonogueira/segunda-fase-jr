{% extends "pacientes/base.html" %}

{% block conteudo %}
<h1>Remover Paciente</h1>
<p>Tem certeza que deseja remover <strong>{{ paciente.nome }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Confirmar Remoção</button>
    <a href="{% url 'lista_pacientes' %}">Cancelar</a>
</form>
{% endblock %}
