{% extends "pacientes/base.html" %}

{% block conteudo %}
<div class="cabecalho">
    <a href="{% url 'lista_pacientes' %}" class="btn-secondary">← Voltar</a>
</div>

<div style="text-align: center; margin-top: 20px;">
    <h1 style="margin-bottom: 8px;"> Acesso pelo Celular</h1>
    <p style="color: #718096; margin-bottom: 32px;">Escaneie o QR Code abaixo para acessar o VitaClin pelo celular</p>

    <div class="form-container" style="max-width: 360px; text-align: center;">
        <img src="data:image/png;base64,{{ qr_img }}" style="width: 240px; height: 240px; border-radius: 8px;">
        <p style="margin-top: 16px; color: #718096; font-size: 0.85rem;">{{ url }}</p>
    </div>
</div>
{% endblock %}
