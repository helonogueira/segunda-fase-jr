{% extends "pacientes/base.html" %}

{% block conteudo %}
<h1>{{ acao }} Paciente</h1>

<form method="POST">
    {% csrf_token %}
    <label>Nome</label>
    <input type="text" name="nome" value="{{ paciente.nome }}" required>

    <label>Data de Nascimento</label>
    <input type="date" name="data_nascimento" value="{{ paciente.data_nascimento }}" required>

    <label>Contato</label>
    <input type="text" name="contato" value="{{ paciente.contato }}" required>

    <label>Especialidade</label>
    <input type="text" name="especialidade" value="{{ paciente.especialidade }}" required>

    <label>Observações</label>
    <textarea name="observacoes">{{ paciente.observacoes }}</textarea>

    <button type="submit" class="btn-primary">{{ acao }}</button>
    <a href="{% url 'lista_pacientes' %}">Cancelar</a>
</form>
{% endblock %}
